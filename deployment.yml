glider_devices:
  pressure:
    make: Micron
    model: Pressure
    serial: '104702'
  ctd:
    make: RBR
    model: legatoCTD
    serial: '9507'
    long_name: RBR SlocumCTD
    make_model: RBR SlocumCTD
    factory_calibrated: " "
    calibration_date: " "
    calibration_report: " "
    comment:   " "
    Thermal_lag_constants_[alpha,tau]: [0.2, 2]
    dTdC: 0
    comment: 'Constants for ctd_9507 are found using dfo-rosie713-20230810. A detailed report of how the constants are defined can be found on https://cproof.uvic.ca. There is no lag between temperature and conductivity.'

  optics:
    make: Wetlabs
    model: FLBBCDSLC
    serial: '5059'
  oxygen:
    make: AADI
    model: Optode4831
    serial: '665'

# map between glider variables and netcdf variables.  This shouldn't
# change too much.
netcdf_variables:
  # Time and Place:
  time:
    source:   sci_m_present_time
    long_name:     Time
    standard_name: time
    calendar:      gregorian
    units:         seconds since 1970-01-01T00:00:00Z
    axis:          T
    observation_type: "measured"

  latitude:
    source:  m_lat
    long_name:    latitude
    standard_name: latitude
    units:        degrees_north
    axis:         Y
    comment:     "Estimated between surface fixes"
    observation_type: measured
    platform:     platform
    reference:    WGS84
    valid_max:    90.0
    valid_min:    -90.0
    coordinate_reference_frame:  urn:ogc:crs:EPSG::4326

  longitude:
    source:  m_lon
    long_name:    longitude
    standard_name: longitude
    units:        degrees_east
    axis:         X
    comment:     "Estimated between surface fixes"
    observation_type: measured
    platform:     platform
    reference:    WGS84
    valid_max:    180.0
    valid_min:    -180.0
    coordinate_reference_frame:  urn:ogc:crs:EPSG::4326

  heading:
    source:  m_heading
    long_name:    glider heading angle
    standard_name: platform_orientation
    units:        degrees
    coordinates:  time latitude longitude depth

  pitch:
    source:  m_pitch
    long_name:    glider pitch angle
    standard_name: platform_pitch_angle
    units:        degrees
    coordinates:  time latitude longitude depth

  roll:
    source:  m_roll
    long_name:    glider roll angle
    standard_name: platform_roll_angle
    units:        degrees
    coordinates:  time latitude longitude depth

  # profile info:
  waypoint_latitude:
    source:  c_wpt_lat
    long_name:    waypoint latitude
    standard_name: latitude
    units:        degree_north

  waypoint_longitude:
    source:  c_wpt_lon
    long_name:    waypoint longitude
    standard_name: longitude
    units:        degree_east

  # data parameters
  conductivity:
    source:  sci_water_cond
    long_name:    water conductivity
    standard_name: sea_water_electrical_conductivity
    units:        S m-1
    instrument:    instrument_ctd
    valid_min:    0.
    valid_max:    10.
    observation_type: "measured"
    accuracy:      0.0003
    precision:     0.0001
    resolution:     0.00002
    coordinates:   time latitude longitude depth

  temperature:
    source:  sci_water_temp
    long_name:    water temperature
    standard_name: sea_water_temperature
    units:        Celsius
    instrument:   instrument_ctd
    valid_min:    -5.0
    valid_max:    50.0
    observation_type: "measured"
    accuracy:      0.002
    precision:     0.001
    resolution:    0.0002
    coordinates:   time latitude longitude depth

  pressure:
    source:  sci_water_pressure
    long_name:    water pressure
    standard_name:  sea_water_pressure
    units:        dbar
    conversion:   bar2dbar
    valid_min:    0.0
    valid_max:    2000.0
    positive:      "down"
    reference_datum:  "sea-surface"
    instrument:     "instrument_ctd"
    observation_type: "measured"
    accuracy:         1.0
    precision:        2.0
    resolution:       0.02
    comment:          "ctd pressure sensor"
    coordinates:      time latitude longitude depth


# optics:
  chlorophyll:
    source:  sci_flbbcd_chlor_units
    long_name:    chlorophyll
    standard_name: concentration_of_chlorophyll_in_sea_water
    units:        mg m-3
    coordinates:  time latitude longitude depth

  cdom:
    source:  sci_flbbcd_cdom_units
    long_name:    CDOM
    units:        ppb
    coordinates:  time latitude longitude depth

  backscatter_700:
    source:  sci_flbbcd_bb_units
    long_name:    700 nm wavelength backscatter
    units:         "1"
    coordinates:  time latitude longitude depth

# Oxygen
  oxygen_concentration:
    source:  sci_oxy4_oxygen
    long_name:    oxygen concentration
    standard_name: mole_concentration_of_dissolved_molecular_oxygen_in_sea_water
    units:        umol l-1
    coordinates:  time latitude longitude depth

# derived water speed:
  # water_velocity_eastward:
  #   source:    m_final_water_vx
  #   long_name:      mean eastward water velocity in segment
  #   standard_name:  barotropic_eastward_sea_water_velocity
  #   units:          m s-1
  #   coordinates:   time depth latitude longitude
  #
  # water_velocity_northward:
  #   source:    m_final_water_vy
